            <figure class="highlight plaintext"><table><tr><td class="code"><pre><span class="line">#include &lt;stdio.h&gt;</span><br><span class="line">#include &lt;stdint.h&gt;</span><br><span class="line">#include &lt;time.h&gt;</span><br><span class="line">#include &lt;stdlib.h&gt;</span><br><span class="line"> </span><br><span class="line">#define u32 uint32_t</span><br><span class="line">#define ROCK 1</span><br><span class="line">#define PAPER 2</span><br><span class="line">#define SCISSORS 3</span><br><span class="line"> </span><br><span class="line">void destemine_winner(u32 player_move, u32 computer_move)</span><br><span class="line">&#123;</span><br><span class="line">	//首先排除平局的情况</span><br><span class="line">	if (player_move == computer_move) &#123;</span><br><span class="line">		puts(&quot;平局！&quot;);</span><br><span class="line">		return;</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	//定义一个胜利的规则映射，其中键是玩家的移动，值是玩家移动可以打败计算机的移动</span><br><span class="line"> </span><br><span class="line">	u32 winning_moves[4] = &#123; 0, SCISSORS, ROCK, PAPER &#125;;</span><br><span class="line">	//0是占位符</span><br><span class="line"> </span><br><span class="line">	//winning_moves[1] SCISSORS</span><br><span class="line">	//ROCK == 1</span><br><span class="line">	//PAPER == 2</span><br><span class="line">	//SCISSORS == 3</span><br><span class="line">	</span><br><span class="line">	//这里player_move是玩家的移动，winning_moves[player_move]这个是可以打败计算机的移动</span><br><span class="line">	//比如说玩家选1，只有当计算机选3时才会输，那么就将winning_moves中的winning_moves[1]设置位3</span><br><span class="line">	if (computer_move == winning_moves[player_move]) &#123;</span><br><span class="line">		puts(&quot;你赢了！&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">	else &#123;</span><br><span class="line">		puts(&quot;你输了！&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">u32 get_player_choice() &#123;</span><br><span class="line">	u32 choice;</span><br><span class="line">	puts(&quot;请选择：1是石头，2是布，3是剪刀&quot;);</span><br><span class="line">	scanf_s(&quot;%d&quot;, &amp;choice);</span><br><span class="line"> </span><br><span class="line">	while (choice &lt; ROCK || choice &gt; SCISSORS) &#123;</span><br><span class="line">		puts(&quot;无效选择！请重新选择：1是石头，2是布，3是剪刀&quot;);</span><br><span class="line">		scanf_s(&quot;%d&quot;, &amp;choice);</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	return choice;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">u32 get_computer_choice() &#123;</span><br><span class="line">	return (rand() % (SCISSORS - ROCK + 1)) + ROCK;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">void print_instructions() &#123;</span><br><span class="line"> </span><br><span class="line">	puts(&quot;石头~剪刀~布，游戏开始！&quot;);</span><br><span class="line">	puts(&quot;规则：输入数字，确定猜拳。1是石头，2是布，3是剪刀&quot;);</span><br><span class="line">	puts(&quot;==========================================&quot;);</span><br><span class="line">&#125;</span><br><span class="line">void print_choice(u32 choice) &#123;</span><br><span class="line">	switch (choice)</span><br><span class="line">	&#123;</span><br><span class="line">	case ROCK: puts(&quot;石头&quot;); break;</span><br><span class="line">	case PAPER: puts(&quot;布&quot;); break;</span><br><span class="line">	case SCISSORS: puts(&quot;剪刀&quot;); break;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">int main(void)</span><br><span class="line">&#123;</span><br><span class="line">	//初始化随机数生成器</span><br><span class="line">	srand(time(NULL));</span><br><span class="line"> </span><br><span class="line">	//打印游戏说明</span><br><span class="line">	print_instructions();</span><br><span class="line"> </span><br><span class="line">	//获取玩家和计算机的选择</span><br><span class="line">	u32 player_choice = get_player_choice();</span><br><span class="line">	u32 computer_choice = get_computer_choice();</span><br><span class="line"> </span><br><span class="line">	//展示玩家和计算器的选择</span><br><span class="line">	puts(&quot;你选择了&quot;);</span><br><span class="line">	print_choice(player_choice);</span><br><span class="line">	puts(&quot;计算机选择了&quot;);</span><br><span class="line">	print_choice(computer_choice);</span><br><span class="line"> </span><br><span class="line">	//判断确认赢家，并且展示</span><br><span class="line">	destemine_winner(player_choice, computer_choice);</span><br><span class="line"> </span><br><span class="line">	return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

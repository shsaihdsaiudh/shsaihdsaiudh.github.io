s="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;stdio.h&gt;</span><br><span class="line">#include &lt;stdint.h&gt;</span><br><span class="line">#include &lt;time.h&gt;</span><br><span class="line">#include &lt;stdlib.h&gt;</span><br><span class="line"> </span><br><span class="line">#define u32 uint32_t</span><br><span class="line">#define ROCK 1</span><br><span class="line">#define PAPER 2</span><br><span class="line">#define SCISSORS 3</span><br><span class="line"> </span><br><span class="line">void destemine_winner(u32 player_move, u32 computer_move)</span><br><span class="line">&#123;</span><br><span class="line">	//пњљпњљпњљпњљпњљ≈≥пњљ∆љпњљ÷µпњљпњљпњљпњљ</span><br><span class="line">	if (player_move == computer_move) &#123;</span><br><span class="line">		puts(&quot;∆љпњљ÷£пњљ&quot;);</span><br><span class="line">		return;</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	//пњљпњљпњљпњљ“їпњљпњљ §пњљпњљпњљƒєпњљпњљпњљ”≥пњљд£ђпњљпњљпњљ–Љпњљпњљпњљпњљпњљ“µпњљпњљ∆ґпњљпњљпњљ÷µпњљпњљпњљпњљпњљпњљ∆ґпњљпњљпњљпњљ‘іпњљ№Љпњљпњљпњљпњљпњљпњљпњљ∆ґпњљ</span><br><span class="line"> </span><br><span class="line">	u32 winning_moves[4] = &#123; 0, SCISSORS, ROCK, PAPER &#125;;</span><br><span class="line">	//0пњљпњљ’Љќїпњљпњљ</span><br><span class="line"> </span><br><span class="line">	//winning_moves[1] SCISSORS</span><br><span class="line">	//ROCK == 1</span><br><span class="line">	//PAPER == 2</span><br><span class="line">	//SCISSORS == 3</span><br><span class="line">	</span><br><span class="line">	//пњљпњљпњљпњљplayer_moveпњљпњљпњљпњљ“µпњљпњљ∆ґпњљпњљпњљwinning_moves[player_move]пњљпњљпњљпњљ«њпњљпњљ‘іпњљ№Љпњљпњљпњљпњљпњљпњљпњљ∆ґпњљ</span><br><span class="line">	//пњљпњљпњљпњљЋµпњљпњљпњљ—°1пњљпњљ÷їпњљ–µпњљпњљпњљпњљпњљпњљ—°3 ±пњљ≈їпњљпњљд£ђпњљпњљ√іпњљЌљпњљwinning_movesпњљ–µпњљwinning_moves[1]пњљпњљпњљпњљќї3</span><br><span class="line">	if (computer_move == winning_moves[player_move]) &#123;</span><br><span class="line">		puts(&quot;пњљпњљ”ЃпњљЋ£пњљ&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">	else &#123;</span><br><span class="line">		puts(&quot;пњљпњљпњљпњљпњљЋ£пњљ&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">u32 get_player_choice() &#123;</span><br><span class="line">	u32 choice;</span><br><span class="line">	puts(&quot;пњљпњљ—°пњљпњљ1пњљпњљ ѓЌЈпњљпњљ2пњљ«≤пњљпњљпњљ3пњљ«Љпњљпњљпњљ&quot;);</span><br><span class="line">	scanf_s(&quot;%d&quot;, &amp;choice);</span><br><span class="line"> </span><br><span class="line">	while (choice &lt; ROCK || choice &gt; SCISSORS) &#123;</span><br><span class="line">		puts(&quot;пњљпњљ–І—°пњљпњљпњљпњљпњљпњљпњљпњљ—°пњљпњљ1пњљпњљ ѓЌЈпњљпњљ2пњљ«≤пњљпњљпњљ3пњљ«Љпњљпњљпњљ&quot;);</span><br><span class="line">		scanf_s(&quot;%d&quot;, &amp;choice);</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	return choice;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">u32 get_computer_choice() &#123;</span><br><span class="line">	return (rand() % (SCISSORS - ROCK + 1)) + ROCK;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">void print_instructions() &#123;</span><br><span class="line"> </span><br><span class="line">	puts(&quot; ѓЌЈ~пњљпњљпњљпњљ~пњљпњљпњљпњљпњљпњљѕЈпњљпњљ Љпњљпњљ&quot;);</span><br><span class="line">	puts(&quot;пњљпњљпњљпњљпњљпњљпњљпњљпњљпњљпњљ÷£пњљ»Јпњљпњљпњљпњљ»≠пњљпњљ1пњљпњљ ѓЌЈпњљпњљ2пњљ«≤пњљпњљпњљ3пњљ«Љпњљпњљпњљ&quot;);</span><br><span class="line">	puts(&quot;==========================================&quot;);</span><br><span class="line">&#125;</span><br><span class="line">void print_choice(u32 choice) &#123;</span><br><span class="line">	switch (choice)</span><br><span class="line">	&#123;</span><br><span class="line">	case ROCK: puts(&quot; ѓЌЈ&quot;); break;</span><br><span class="line">	case PAPER: puts(&quot;пњљпњљ&quot;); break;</span><br><span class="line">	case SCISSORS: puts(&quot;пњљпњљпњљпњљ&quot;); break;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line">int main(void)</span><br><span class="line">&#123;</span><br><span class="line">	//пњљпњљ Љпњљпњљпњљпњљпњљпњљпњљпњљпњљпњљпњљпњљпњљ</span><br><span class="line">	srand(time(NULL));</span><br><span class="line"> </span><br><span class="line">	//пњљпњљ”°пњљпњљѕЈЋµпњљпњљ</span><br><span class="line">	print_instructions();</span><br><span class="line"> </span><br><span class="line">	//пњљпњљ»°пњљпњљ“ЇЌЉпњљпњљпњљпњљпњљпњљ—°пњљпњљ</span><br><span class="line">	u32 player_choice = get_player_choice();</span><br><span class="line">	u32 computer_choice = get_computer_choice();</span><br><span class="line"> </span><br><span class="line">	//’є Њпњљпњљ“ЇЌЉпњљпњљпњљпњљпњљпњљпњљ—°пњљпњљ</span><br><span class="line">	puts(&quot;пњљпњљ—°пњљпњљпњљпњљ&quot;);</span><br><span class="line">	print_choice(player_choice);</span><br><span class="line">	puts(&quot;пњљпњљпњљпњљпњљ—°пњљпњљпњљпњљ&quot;);</span><br><span class="line">	print_choice(computer_choice);</span><br><span class="line"> </span><br><span class="line">	//пњљ–ґпњљ»Јпњљпњљ”Ѓпњљ“£пњљпњљпњљпњљпњљ’є Њ</span><br><span class="line">	destemine_winner(player_choice, computer_choice);</span><br><span class="line"> </span><br><span class="line">	return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
